<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>팡이 리듬! 🎵</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;}
  /* ===== 테마 (기본: 밝은 버전) ===== */
  :root{
    --gold:#ffce4a;--gold2:#ff9d2e;--green:#46d17e;--pink:#ff6fa5;--cyan:#46d1d1;--ink:#10182f;
    --gold-text:#b06a12;--green-text:#1f8a4d;--pink-text:#b83a83;--cyan-text:#0e8e8e;
    --page-grad:linear-gradient(135deg,#f2e9fb 0%,#fbe3f0 28%,#ffe4dd 55%,#ffedd3 78%,#fdf7d8 100%);
    --text:#3a2b52;--muted:#8a7fa0;
    --panel:#fffdfc;--panel2:#faf3fb;--hairline:rgba(132,94,194,.18);
    --card-grad:linear-gradient(180deg,#ffffff,#fbf0f7);
    --chip-sel-grad:linear-gradient(180deg,#f3e3fb,#ffd9ec);
    --game-panel:#141f3f;--game-muted:#a8b8e6; /* 게임 화면은 테마와 무관하게 항상 어두운 보드 */
  }
  [data-theme="dark"]{
    --gold-text:#ffce4a;--green-text:#46d17e;--pink-text:#ff6fa5;--cyan-text:#46d1d1;
    --page-grad:radial-gradient(circle at 50% 0%,#3a4a99,#1b2b4d 60%,#0e1430);
    --text:#fff;--muted:#a8b8e6;
    --panel:#26346a;--panel2:#141f3f;--hairline:rgba(255,255,255,.12);
    --card-grad:linear-gradient(180deg,#2d3d7a,#1a2750);
    --chip-sel-grad:linear-gradient(180deg,#3a4a8a,#26346a);
  }
  html,body{height:100%;}
  body{background:var(--page-grad);display:flex;align-items:center;justify-content:center;min-height:100vh;color:var(--text);overflow:hidden;}
  .app{width:min(960px,100vw,177.78vh);aspect-ratio:16/9;position:relative;display:flex;flex-direction:column;overflow:hidden;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;}
  .hidden{display:none!important;}
  .btn{padding:15px 20px;border:none;border-radius:14px;font-weight:900;font-size:16px;cursor:pointer;transition:.1s;}
  .btn:active{transform:translateY(3px);}
  .btn.primary{background:linear-gradient(180deg,#7be3a1,var(--green));color:#0a3a1f;box-shadow:0 5px 0 #2c9c58;}
  .btn.gold{background:linear-gradient(180deg,#ffe89a,var(--gold2));color:var(--ink);box-shadow:0 4px 0 #b86a12;}
  .btn.ghost{background:var(--panel);color:var(--text);border:1px solid var(--hairline);}
  .btn:active{box-shadow:none;}

  /* ===== 로비 ===== */
  #lobby{align-items:center;justify-content:center;padding:24px;text-align:center;}
  .logo{font-size:38px;font-weight:900;text-shadow:0 4px 0 #2d4d9c,0 6px 10px rgba(0,0,0,.4);margin-bottom:4px;}
  .logo .note{display:inline-block;animation:bounce 1s ease-in-out infinite;}
  @keyframes bounce{50%{transform:translateY(-8px)}}
  .sub{color:var(--muted);font-size:14px;margin-bottom:24px;}
  .pangi-demo{display:flex;gap:14px;margin-bottom:26px;}
  .demo-dot{width:50px;height:50px;border-radius:50%;position:relative;animation:wob 1.4s ease-in-out infinite;}
  .demo-dot:nth-child(2){animation-delay:.2s}.demo-dot:nth-child(3){animation-delay:.4s}
  .demo-dot.white{background:radial-gradient(circle at 38% 30%,#fff,#9a90bb);}
  .demo-dot.black{background:radial-gradient(circle at 38% 30%,#5a5070,#100b1c);}
  .demo-dot.gold{background:radial-gradient(circle at 38% 30%,#fff3c0,#e08a18);box-shadow:0 0 14px rgba(255,206,74,.6);}
  .demo-dot .e{position:absolute;top:34%;width:10px;height:12px;background:#fff;border-radius:50%;}
  .demo-dot .e.l{left:26%}.demo-dot .e.r{right:26%}
  .demo-dot .e::after{content:'';position:absolute;top:32%;left:28%;width:4px;height:5px;background:#111;border-radius:50%;}
  .nick-input{width:100%;max-width:320px;padding:15px;border-radius:14px;border:2px solid var(--hairline);background:var(--panel2);color:var(--text);font-size:17px;text-align:center;font-weight:700;margin-bottom:14px;}
  .nick-input:focus{outline:none;border-color:var(--gold);}

  /* ===== 헤더 ===== */
  .topbar{padding:14px 16px 4px;display:flex;align-items:center;justify-content:space-between;}
  .title{font-size:19px;font-weight:900;text-shadow:0 3px 0 #2d4d9c;display:flex;gap:6px;align-items:center;}
  .me-chip{background:var(--panel2);padding:6px 12px;border-radius:20px;font-size:12px;color:var(--muted);}
  .me-chip b{color:var(--text);}
  .help-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(180deg,#ffe89a,var(--gold2));color:var(--ink);font-weight:900;font-size:17px;box-shadow:0 3px 0 #b86a12;}
  .theme-btn{width:32px;height:32px;border-radius:50%;border:1px solid var(--hairline);cursor:pointer;background:var(--panel);color:var(--text);font-size:15px;display:flex;align-items:center;justify-content:center;}

  /* ===== 홈 (16:9, 스크롤 없이 한 화면) ===== */
  .home-main{flex:1;display:flex;gap:14px;padding:0 16px 14px;min-height:0;}
  .home-side{width:230px;flex-shrink:0;display:flex;flex-direction:column;gap:8px;min-height:0;}

  /* ===== 선택 UI (곡) ===== */
  .sel-label{font-size:11px;color:var(--muted);font-weight:700;margin:0 2px 5px;}
  .song-chips{display:flex;gap:8px;flex-wrap:wrap;}
  .chip{flex:0 0 auto;min-width:82px;background:var(--panel);border:2px solid var(--hairline);border-radius:12px;padding:8px 10px;text-align:center;cursor:pointer;transition:.12s;color:var(--text);}
  .chip.sel{border-color:var(--gold);background:var(--chip-sel-grad);box-shadow:0 0 12px rgba(255,206,74,.35);}
  .chip .c{font-size:22px;line-height:1;}
  .chip .n{font-size:11px;font-weight:700;margin-top:3px;white-space:nowrap;}

  /* ===== 홈 점수 ===== */
  .home-best{background:var(--card-grad);border-radius:14px;padding:10px 14px;font-size:13px;border:1px solid var(--hairline);display:flex;flex-direction:column;gap:2px;}
  .home-best .sel-info{color:var(--text);font-weight:800;}
  .home-best .best-info{color:var(--muted);}
  .home-best .best-info b{color:var(--gold-text);font-size:16px;}
  .help-panel{flex:1;background:var(--panel2);border-radius:16px;border:1px solid var(--hairline);min-height:0;padding:10px 14px;display:flex;flex-direction:column;}
  .help-panel-head{font-size:13px;font-weight:800;color:var(--gold-text);margin-bottom:8px;flex-shrink:0;}
  .help-grid{flex:1;display:grid;grid-template-columns:repeat(5,1fr);gap:10px;min-height:0;}
  .play-area{margin-top:auto;display:flex;gap:8px;}
  .play-btn{flex:1;padding:14px;border:none;border-radius:16px;cursor:pointer;background:linear-gradient(180deg,#ffd76b,var(--gold2));color:var(--ink);font-size:16px;font-weight:900;box-shadow:0 5px 0 #b86a12;}
  .play-btn:active{transform:translateY(4px);box-shadow:none;}
  .refresh-btn{width:46px;border:none;border-radius:16px;background:var(--panel);color:var(--text);font-size:18px;cursor:pointer;box-shadow:0 5px 0 #0c1430;}
  .refresh-btn:active{transform:translateY(4px);box-shadow:none;}

  /* ===== 게임 (테마와 무관하게 항상 어두운 보드) ===== */
  #game{background:radial-gradient(circle at 50% 25%,#2a3a6e,#0e1430);color:#fff;}
  .game-hud{padding:12px 16px 4px;display:flex;justify-content:space-between;align-items:flex-start;}
  .hud-l .score-big{font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1;}
  .hud-l .acc{font-size:12px;color:var(--game-muted);margin-top:2px;}
  .pause-btn{position:absolute;top:12px;right:14px;z-index:20;width:38px;height:38px;border-radius:10px;border:none;background:var(--game-panel);color:#fff;font-size:15px;cursor:pointer;box-shadow:0 3px 0 #0c1430;}
  .pause-btn:active{transform:translateY(2px);box-shadow:none;}
  .progress{height:6px;margin:6px 16px 0;background:var(--game-panel);border-radius:4px;overflow:hidden;}
  .progress .bar{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--gold));transition:width .1s linear;}
  .song-name-mini{text-align:center;font-size:12px;color:var(--game-muted);margin-top:6px;}

  .grid-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:12px 10px;min-height:0;}
  .grid{display:grid;grid-template-columns:repeat(2,1fr);gap:min(8vh,40px) 40px;width:min(300px,90%);}
  .hole{aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 50% 35%,#16203e 40%,#0a1228 100%);box-shadow:inset 0 8px 18px rgba(0,0,0,.8),inset 0 -3px 6px rgba(80,110,200,.25);position:relative;overflow:visible;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .hole .clip{position:absolute;inset:0;border-radius:50%;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;}
  .hole::after{content:'';position:absolute;left:8%;right:8%;top:6%;height:30%;border-radius:50%;background:radial-gradient(ellipse at 50% 0%,rgba(0,0,0,.6),transparent 70%);pointer-events:none;z-index:5;}
  .hole.flash{animation:holeFlash .25s ease-out;}
  @keyframes holeFlash{0%{box-shadow:inset 0 8px 18px rgba(0,0,0,.8),0 0 0 0 var(--gold)}100%{box-shadow:inset 0 8px 18px rgba(0,0,0,.8),0 0 0 14px rgba(255,206,74,0)}}

  /* 남은 시간 카운트다운 */
  .tap-timer{position:absolute;top:4%;left:50%;transform:translateX(-50%);width:30%;aspect-ratio:1;border-radius:50%;background:rgba(0,0,0,.6);border:2px solid var(--cyan);color:#fff;font-weight:900;font-size:15px;display:flex;align-items:center;justify-content:center;z-index:7;pointer-events:none;}

  /* 팡이 */
  .pangi-stack{position:absolute;bottom:-110%;display:flex;transition:bottom .18s cubic-bezier(.34,1.56,.64,1);padding-bottom:8%;z-index:4;}
  .pangi-stack.up{bottom:6%;}
  .pangi-stack.retract{bottom:-120%;transition:bottom .18s ease-in;}
  .pangi{width:44px;height:44px;border-radius:50%;position:relative;margin:0 -7px;box-shadow:0 4px 8px rgba(0,0,0,.4);animation:wob 1.2s ease-in-out infinite;}
  @keyframes wob{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  .pangi.white{background:radial-gradient(circle at 38% 30%,#fff,#c9c2dd 75%,#9a90bb);}
  .pangi.black{background:radial-gradient(circle at 38% 30%,#5a5070,#211a33 75%,#100b1c);}
  .pangi.gold{background:radial-gradient(circle at 38% 30%,#fff3c0,#ffce4a 60%,#e08a18);box-shadow:0 0 14px rgba(255,206,74,.7);}
  .pangi .eye{position:absolute;top:34%;width:10px;height:12px;background:#fff;border-radius:50%;}
  .pangi .eye.l{left:26%}.pangi .eye.r{right:26%}
  .pangi .eye::after{content:'';position:absolute;top:32%;left:28%;width:4px;height:5px;background:#111;border-radius:50%;}

  .judge-pop{position:absolute;left:50%;top:40%;transform:translateX(-50%);font-weight:900;font-size:18px;pointer-events:none;z-index:8;animation:jp .5s ease-out forwards;text-shadow:0 2px 4px #000;}
  @keyframes jp{0%{opacity:0;transform:translate(-50%,4px) scale(.6)}30%{opacity:1}100%{opacity:0;transform:translate(-50%,-22px) scale(1.1)}}
  .judge-good{color:var(--cyan)} .judge-miss{color:var(--pink)}

  .countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;font-size:90px;font-weight:900;color:#fff;text-shadow:0 0 30px var(--gold);}

  /* 모달 */
  .overlay{position:absolute;inset:0;background:rgba(8,12,30,.85);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:40;padding:20px;}
  .modal{width:100%;max-width:340px;background:var(--card-grad);border-radius:22px;padding:22px;border:1px solid var(--hairline);box-shadow:0 20px 50px rgba(0,0,0,.6);color:var(--text);}
  .modal h2{text-align:center;font-size:20px;margin-bottom:14px;color:var(--gold-text);}
  .res-score{text-align:center;font-size:40px;font-weight:900;color:var(--gold-text);}
  .res-grade{text-align:center;font-size:54px;font-weight:900;margin:4px 0;}
  .res-stats{display:flex;justify-content:space-around;background:var(--panel2);border-radius:12px;padding:12px;margin:12px 0;}
  .res-stats .st{text-align:center;font-size:11px;color:var(--muted);}
  .res-stats .st b{display:block;font-size:18px;margin-top:2px;}
  .res-stats .st.g b{color:var(--cyan-text)}.res-stats .st.m b{color:var(--pink-text)}
  .res-rank{text-align:center;font-size:14px;margin-bottom:12px;}
  .res-rank b{color:var(--gold-text);font-size:20px;}
  .new-best{text-align:center;color:var(--green-text);font-weight:900;font-size:14px;margin-bottom:6px;animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.5}}
  .btn-row{display:flex;gap:10px;margin-top:6px;}
  .btn-row .btn{flex:1;}
  .fld{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin:8px 0;color:var(--text);}
  .fld input{width:110px;padding:8px;border-radius:8px;border:1px solid var(--hairline);background:var(--panel2);color:var(--text);text-align:center;font-size:14px;}
  .help-step{display:flex;flex-direction:column;min-height:0;min-width:0;}
  .help-shot{width:100%;flex:1 1 auto;min-height:0;display:block;border-radius:8px;margin-bottom:6px;}
  .step-row{display:flex;gap:6px;align-items:flex-start;flex-shrink:0;}
  .step-row .n{width:17px;height:17px;flex-shrink:0;border-radius:50%;background:var(--gold);color:var(--ink);font-weight:900;display:flex;align-items:center;justify-content:center;font-size:10px;}
  .step-row .txt{font-size:10.5px;line-height:1.35;color:var(--text);}
  .step-row .txt b{color:var(--gold-text);}
  .toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);padding:10px 18px;border-radius:20px;font-size:13px;z-index:60;opacity:0;transition:.3s;white-space:nowrap;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

  <!-- ===== 로비 ===== -->
  <div class="screen" id="lobby">
    <button class="theme-btn" id="themeBtnLobby" onclick="toggleTheme()" title="어두운 화면으로 전환" style="position:absolute;top:14px;right:16px;">🌙</button>
    <div class="logo">🎵 팡이 리듬<span class="note">♪</span></div>
    <div class="sub">노래 박자에 맞춰 팡이를 터치하세요</div>
    <div class="pangi-demo">
      <div class="demo-dot white"><div class="e l"></div><div class="e r"></div></div>
      <div class="demo-dot black"><div class="e l"></div><div class="e r"></div></div>
      <div class="demo-dot gold"><div class="e l"></div><div class="e r"></div></div>
    </div>
    <input class="nick-input" id="nickInput" maxlength="12" placeholder="닉네임을 입력하세요" autocomplete="off">
    <button class="btn primary" style="width:100%;max-width:320px;" onclick="enter()">입장하기 ▶</button>
  </div>

  <!-- ===== 홈 ===== -->
  <div class="screen hidden" id="home">
    <div class="topbar">
      <div class="title">🎵 팡이 리듬</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="help-btn" onclick="backToLobby()" title="로비로 돌아가기">🏠</button>
        <span class="me-chip">👤 <b id="meNick">-</b></span>
        <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="어두운 화면으로 전환">🌙</button>
      </div>
    </div>

    <div class="home-main">
    <div class="home-side">
      <div class="sel-label">🎼 곡 선택</div>
      <div class="song-chips" id="songChips"></div>

      <div class="home-best">
        <span class="sel-info" id="selInfo">스윙 버튼</span>
        <span class="best-info" id="bestInfo">내 최고 <b id="myBest">0</b> <span id="myRankLine"></span></span>
      </div>

      <div class="play-area">
        <button class="play-btn" onclick="startGame()">🎵 플레이 시작</button>
        <button class="refresh-btn" onclick="loadLeaderboard()" title="새로고침">🔄</button>
      </div>
    </div>

    <div class="help-panel">
      <div class="help-panel-head">📖 플레이 방법</div>
      <div class="help-grid">

      <div class="help-step">
        <svg class="help-shot" viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">
          <rect width="240" height="120" rx="12" fill="var(--panel2)"/>
          <text x="120" y="22" text-anchor="middle" font-size="12" fill="var(--muted)">♪ 노래 박자에 맞춰 ♪</text>
          <circle cx="120" cy="70" r="34" fill="#0a1228"/>
          <circle cx="120" cy="70" r="52" fill="none" stroke="var(--cyan)" stroke-width="3" opacity=".85"/>
          <circle cx="120" cy="68" r="20" fill="var(--gold)"/>
          <ellipse cx="112" cy="65" rx="3.2" ry="3.8" fill="#fff"/><ellipse cx="128" cy="65" rx="3.2" ry="3.8" fill="#fff"/>
          <circle cx="112" cy="66.5" r="1.2" fill="#111"/><circle cx="128" cy="66.5" r="1.2" fill="#111"/>
        </svg>
        <div class="step-row"><div class="n">1</div><div class="txt">노래 박자에 맞춰 <b>구멍에서 팡이가 등장</b>해요.</div></div>
      </div>

      <div class="help-step">
        <svg class="help-shot" viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">
          <rect width="240" height="120" rx="12" fill="var(--panel2)"/>
          <circle cx="80" cy="66" r="34" fill="#0a1228"/>
          <circle cx="80" cy="64" r="20" fill="var(--gold)"/>
          <ellipse cx="72" cy="61" rx="3.2" ry="3.8" fill="#fff"/><ellipse cx="88" cy="61" rx="3.2" ry="3.8" fill="#fff"/>
          <circle cx="72" cy="62.5" r="1.2" fill="#111"/><circle cx="88" cy="62.5" r="1.2" fill="#111"/>
          <circle cx="80" cy="30" r="15" fill="rgba(0,0,0,.6)" stroke="var(--cyan)" stroke-width="2.5"/>
          <text x="80" y="35" text-anchor="middle" font-size="15" font-weight="900" fill="#fff">3</text>
          <path d="M140 34 L140 66 L147 59 L152 71 L157 69 L152 57 L162 57 Z" fill="#fff" stroke="#10182f" stroke-width="1.5" stroke-linejoin="round"/>
          <g font-size="12" font-weight="800" text-anchor="middle">
            <rect x="182" y="24" width="20" height="20" rx="5" fill="var(--panel)" stroke="var(--muted)"/><text x="192" y="39" fill="var(--text)">E</text>
            <rect x="206" y="24" width="20" height="20" rx="5" fill="var(--panel)" stroke="var(--muted)"/><text x="216" y="39" fill="var(--text)">O</text>
            <rect x="182" y="48" width="20" height="20" rx="5" fill="var(--panel)" stroke="var(--muted)"/><text x="192" y="63" fill="var(--text)">F</text>
            <rect x="206" y="48" width="20" height="20" rx="5" fill="var(--panel)" stroke="var(--muted)"/><text x="216" y="63" fill="var(--text)">K</text>
          </g>
          <text x="120" y="104" text-anchor="middle" font-size="12" fill="var(--muted)">칸 위 숫자가 남은 시간!</text>
        </svg>
        <div class="step-row"><div class="n">2</div><div class="txt">마우스 클릭 또는 키보드 <b>E·F·O·K</b>로 눌러주세요. 칸 위에 <b>남은 시간(초)</b>이 표시돼요.</div></div>
      </div>

      <div class="help-step">
        <svg class="help-shot" viewBox="0 0 240 120" xmlns="http://www.w3.org/2000/svg">
          <rect width="240" height="120" rx="12" fill="var(--panel2)"/>
          <line x1="120" y1="14" x2="120" y2="106" stroke="var(--hairline)"/>
          <circle cx="62" cy="58" r="28" fill="#0a1228"/>
          <path d="M50 46 L74 70 M74 46 L50 70" stroke="var(--pink)" stroke-width="4" stroke-linecap="round"/>
          <text x="62" y="102" text-anchor="middle" font-size="13" font-weight="800" fill="var(--pink-text)">MISS</text>
          <circle cx="178" cy="58" r="28" fill="#0a1228"/>
          <path d="M166 58 L175 67 L192 48" fill="none" stroke="var(--cyan)" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>
          <text x="178" y="102" text-anchor="middle" font-size="13" font-weight="800" fill="var(--cyan-text)">GOOD</text>
        </svg>

<script>
/* ========================================================================
   상태 / 설정
======================================================================== */
let me = { nickname:'' };
const REACT_WINDOW = 2.5;       // 팡이 등장 후 반응 제한시간(s) — 이 안에 다 누르면 GOOD, 넘기면 MISS
const SCORE_GOOD = 100;

/* ===== 테마(밝음/어두움) ===== */
function applyTheme(theme){
  if(theme==='dark'){ document.documentElement.setAttribute('data-theme','dark'); }
  else{ document.documentElement.removeAttribute('data-theme'); theme='light'; }
  document.querySelectorAll('.theme-btn').forEach(b=>{
    b.textContent = theme==='dark' ? '☀️' : '🌙';
    b.title = theme==='dark' ? '밝은 화면으로 전환' : '어두운 화면으로 전환';
  });
  localStorage.setItem('pangi_theme', theme);
}
function toggleTheme(){
  const cur = document.documentElement.getAttribute('data-theme')==='dark' ? 'dark' : 'light';
  applyTheme(cur==='dark' ? 'light' : 'dark');
}
applyTheme(localStorage.getItem('pangi_theme') || 'light');

/* ------------------------------------------------------------------------
   곡 목록 — 실제 음원(mp3) 1곡, BPM/오프셋에 맞춰 리듬 패턴(chart 타입)이
   고정 적용됩니다.
   - chart: 'swingEighth'(스윙 8비트+연타, 자동 생성) / 'custom'(직접 작성한
            note 배열 — song.notes 참고, 아래 chartSwingEighth 위 설명 참고)
   bpm·offset·lengthBeats는 ffmpeg+numpy 온셋 분석으로 실측한 값입니다.
------------------------------------------------------------------------ */
const SONGS = [
  { id:'swingbutton', name:'스윙 버튼', cover:'🎺', kind:'file', src:'songs/swing-button.mp3',
    bpm:152.0, offset:0.154, lengthBeats:400, diffKey:'normal', chart:'swingEighth' },
];

let curSong = SONGS[0];
let BEAT = 60 / curSong.bpm;

const HOLES = 4;
function colorFor(hole){ return ['white','black','gold','white'][hole]; }
function modeKey(){ return `rhythm:${curSong.id}:${curSong.diffKey}`; }

/* 결정론적 의사난수 (같은 곡은 항상 같은 채보) */
function hash01(i){ const x=Math.sin(i*12.9898+78.233)*43758.5453; return x-Math.floor(x); }

function pickHoleFactory(minGap){
  const lastHoleBeat={};
  return (beat, base)=>{
    let hole=Math.floor(hash01(base)*HOLES)%HOLES, guard=0;
    while(guard<HOLES && lastHoleBeat[hole]!==undefined && (beat-lastHoleBeat[hole])<minGap){ hole=(hole+1)%HOLES; guard++; }
    lastHoleBeat[hole]=beat; return hole;
  };
}

/* "스윙 버튼" — 보통 수준으로, 1.2박 간격에 스윙 추가음·연타가 꽤 자주 */
function chartSwingEighth(lengthBeats){
  const chart=[]; const pickHole=pickHoleFactory(1.2); let seed=300;
  for(let b=4; b<=lengthBeats-2; b+=1.2){
    seed++;
    const r1 = hash01(seed*5.1);
    const c1 = r1<0.22 ? 1 : r1<0.52 ? 2 : r1<0.8 ? 3 : 4;
    chart.push({ b, h:pickHole(b, seed*1.7), c:c1 });
    if(hash01(seed*11.3) < 0.32){
      seed++;
      const b2 = b + 0.6;
      const c2 = hash01(seed*9.3)<0.2 ? 2 : 1;
      chart.push({ b:b2, h:pickHole(b2, seed*1.7), c:c2 });
    }
  }
  return chart;
}

/* 곡별 채보 생성 디스패처
   - 'swingEighth': 알고리즘으로 자동 생성
   - 'custom': song.notes에 직접 적어둔 채보를 그대로 사용 (아래 SONGS 항목 참고) */
function genChartFor(song){
  switch(song.chart){
    case 'swingEighth': return chartSwingEighth(song.lengthBeats);
    case 'custom': return song.notes;
  }
}

/* ========================================================================
   WebAudio
======================================================================== */
let actx, masterGain, noiseBuf, musicSource=null;
function initAudio(){
  if(actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = actx.createGain(); masterGain.gain.value = 0.6; masterGain.connect(actx.destination);
  noiseBuf = actx.createBuffer(1, actx.sampleRate*0.6, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
}
function env(gain,t,a,peak,d){ gain.setValueAtTime(0,t); gain.linearRampToValueAtTime(peak,t+a); gain.exponentialRampToValueAtTime(0.0001,t+a+d); }
function kick(t){ const o=actx.createOscillator(),g=actx.createGain(); o.connect(g);g.connect(masterGain); o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(45,t+0.12); env(g.gain,t,0.001,0.9,0.18); o.start(t);o.stop(t+0.2); }
function snare(t){ const n=actx.createBufferSource();n.buffer=noiseBuf; const f=actx.createBiquadFilter();f.type='highpass';f.frequency.value=1200; const g=actx.createGain(); n.connect(f);f.connect(g);g.connect(masterGain); env(g.gain,t,0.001,0.35,0.14); n.start(t);n.stop(t+0.16); }
function hat(t){ const n=actx.createBufferSource();n.buffer=noiseBuf; const f=actx.createBiquadFilter();f.type='highpass';f.frequency.value=7000; const g=actx.createGain(); n.connect(f);f.connect(g);g.connect(masterGain); env(g.gain,t,0.001,0.12,0.04); n.start(t);n.stop(t+0.05); }
function tone(t,freq,peak,dur,type){ const o=actx.createOscillator(),g=actx.createGain(); o.type=type||'triangle';o.frequency.value=freq; o.connect(g);g.connect(masterGain); env(g.gain,t,0.005,peak,dur); o.start(t);o.stop(t+dur+0.05); }
/* 드럼 심벌(크래시) 소리 — 하이패스 노이즈 2겹(밝은 쉬익 + 살짝 낮은 몸통)으로 합성 */
function cymbal(t){
  const bright=actx.createBufferSource(); bright.buffer=noiseBuf;
  const bf=actx.createBiquadFilter(); bf.type='highpass'; bf.frequency.value=6000;
  const bg=actx.createGain(); bright.connect(bf); bf.connect(bg); bg.connect(masterGain);
  env(bg.gain,t,0.001,0.32,0.32); bright.start(t); bright.stop(t+0.4);

  const body=actx.createBufferSource(); body.buffer=noiseBuf;
  const bodyf=actx.createBiquadFilter(); bodyf.type='highpass'; bodyf.frequency.value=2800;
  const bodyg=actx.createGain(); body.connect(bodyf); bodyf.connect(bodyg); bodyg.connect(masterGain);
  env(bodyg.gain,t,0.001,0.18,0.22); body.start(t); body.stop(t+0.3);
}
function hitPing(){ if(!actx)return; cymbal(actx.currentTime); }
function missThud(){ if(!actx)return; tone(actx.currentTime,160,0.2,0.12,'sawtooth'); }

/* 음악 시작/정지 — 게임 시계(songStart)를 음악 시작에 맞춤 */
let songStart=0;
function startMusic(){
  const src=actx.createBufferSource(); src.buffer=curSong.buffer; src.connect(masterGain);
  const at=actx.currentTime+0.15; src.start(at); musicSource=src;
  songStart = at + (curSong.offset||0);
}
function stopMusic(){
  if(musicSource){ try{ musicSource.stop(); }catch(e){} musicSource=null; }
}

/* 실제 음원(src) 다운로드 + 디코딩 — 최초 1회만, 이후 song.buffer에 캐시 */
const bufferLoads = {};
function ensureBuffer(song){
  if(song.kind !== 'file') return Promise.resolve(null);
  if(song.buffer) return Promise.resolve(song.buffer);
  if(!song.src) return Promise.resolve(null); // 업로드된 곡인데 아직 디코딩 전인 이례적 상태
  if(!bufferLoads[song.id]){
    initAudio();
    bufferLoads[song.id] = fetch(song.src)
      .then(r=>{ if(!r.ok) throw new Error('HTTP '+r.status); return r.arrayBuffer(); })
      .then(arr=>actx.decodeAudioData(arr))
      .then(buf=>{ song.buffer=buf; return buf; })
      .catch(err=>{ delete bufferLoads[song.id]; throw err; });
  }
  return bufferLoads[song.id];
}

/* ========================================================================
   입장 / 선택 UI / 랭킹
======================================================================== */
function enter(){
  const v=document.getElementById('nickInput').value.trim();
  if(!v){ toast('닉네임을 입력해주세요'); return; }
  me.nickname=v; document.getElementById('meNick').textContent=v;
  localStorage.setItem('pangi_nick',v);
  document.getElementById('lobby').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  renderSongChips(); updateSelInfo(); loadLeaderboard();
  ensureBuffer(curSong).catch(()=>{}); // 미리 받아두기(플레이 시작 대기시간 줄이기)
}
function backToLobby(){
  document.getElementById('home').classList.add('hidden');
  document.getElementById('lobby').classList.remove('hidden');
  document.getElementById('nickInput').value = me.nickname || '';
}
document.getElementById('nickInput').addEventListener('keydown',e=>{ if(e.key==='Enter') enter(); });
const saved=localStorage.getItem('pangi_nick'); if(saved) document.getElementById('nickInput').value=saved;

function renderSongChips(){
  const el=document.getElementById('songChips');
  el.innerHTML = SONGS.map(s=>`<div class="chip ${s.id===curSong.id?'sel':''}" data-sid="${s.id}">
      <div class="c">${s.cover}</div><div class="n">${escapeHtml(s.name)}</div></div>`).join('');
  el.querySelectorAll('.chip[data-sid]').forEach(c=>c.onclick=()=>selectSong(SONGS.find(s=>s.id===c.dataset.sid)));
}
function selectSong(s){ if(!s)return; curSong=s; BEAT=60/s.bpm; renderSongChips(); updateSelInfo(); loadLeaderboard(); ensureBuffer(s).catch(()=>{}); }
function updateSelInfo(){ document.getElementById('selInfo').textContent=curSong.name; }

/* 저장소 — 서버 없으면 브라우저 localStorage로 폴백 */
// file:// 또는 정적 호스팅(GitHub Pages 등)이면 서버 대신 브라우저 저장소 사용
const IS_FILE = location.protocol === 'file:' || /github\.io$/.test(location.hostname);
const LS_KEY = 'pangi_scores_v1';
function lsAll(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch(e){ return {}; } }
function lsSave(o){ try{ localStorage.setItem(LS_KEY, JSON.stringify(o)); }catch(e){} }
function localBoard(mode){
  const s=(lsAll()[mode])||{};
  return Object.entries(s).map(([nickname,v])=>({nickname,score:v.score,plays:v.plays||1}))
    .sort((a,b)=>b.score-a.score).slice(0,100).map((r,i)=>({rank:i+1,...r}));
}
function localSubmit(mode,nickname,score){
  const db=lsAll(); const s=db[mode]||(db[mode]={});
  const cur=s[nickname]||{score:0,plays:0}; const isBest=score>cur.score;
  s[nickname]={score:isBest?score:cur.score, plays:(cur.plays||0)+1}; lsSave(db);
  const lb=localBoard(mode); const mr=(lb.find(r=>r.nickname===nickname)||{}).rank||null;
  return {ok:true,isBest,best:s[nickname].score,myRank:mr,leaderboard:lb,total:lb.length};
}
async function apiLeaderboardReq(mode){
  if(IS_FILE) return {ok:true,leaderboard:localBoard(mode),total:localBoard(mode).length};
  try{ const r=await fetch('/api/leaderboard?mode='+encodeURIComponent(mode)); return await r.json(); }
  catch(e){ return {ok:true,leaderboard:localBoard(mode),total:localBoard(mode).length}; }
}
async function apiScoreReq(payload){
  if(IS_FILE) return localSubmit(payload.mode,payload.nickname,payload.score);
  try{ const r=await fetch('/api/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); return await r.json(); }
  catch(e){ return localSubmit(payload.mode,payload.nickname,payload.score); }
}

async function loadLeaderboard(){
  const d=await apiLeaderboardReq(modeKey()); renderRank(d.leaderboard);
}
function renderRank(lb){
  const mine=lb.find(x=>x.nickname===me.nickname);
  document.getElementById('myBest').textContent = mine?mine.score.toLocaleString():'0';
  document.getElementById('myRankLine').textContent = mine?`· ${mine.rank}위`:'';
}
function escapeHtml(s){ return String(s).replace(/[<>&"]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;','"':'&quot;'}[c])); }

/* ========================================================================
   게임
======================================================================== */
let notes=[], rafId=null, playing=false, paused=false, pausedAt=0, countdownTimer=null, curLastBeat=64;
let score=0, cGood=0, cMiss=0, totalTaps=0;

async function startGame(){
  initAudio();
  if(actx.state==='suspended') actx.resume();
  paused=false;
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; }
  document.getElementById('home').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('gameSong').textContent=`🎶 ${curSong.name}`;
  buildGrid();
  score=0;cGood=0;cMiss=0;totalTaps=0;
  updateHUD();

  const cd=document.getElementById('countdown'); cd.classList.remove('hidden');
  if(curSong.kind==='file' && !curSong.buffer){
    cd.textContent='🎵';
    try{ await ensureBuffer(curSong); }
    catch(e){
      toast('음원을 불러오지 못했습니다. 다시 시도해주세요');
      cd.classList.add('hidden');
      document.getElementById('game').classList.add('hidden');
      document.getElementById('home').classList.remove('hidden');
      return;
    }
  }

  let n=3; cd.textContent=n; tone(actx.currentTime,660,0.2,0.2,'square');
  countdownTimer=setInterval(()=>{ n--;
    if(n>0){ cd.textContent=n; tone(actx.currentTime,660,0.2,0.2,'square'); }
    else { clearInterval(countdownTimer); countdownTimer=null; cd.textContent='START!'; tone(actx.currentTime,990,0.25,0.3,'square'); setTimeout(()=>cd.classList.add('hidden'),500); beginSong(); }
  },700);
}

/* ===== 일시정지 / 재개 / 나가기 ===== */
function pauseGame(){
  if(!playing || paused) return;
  paused=true; playing=false;
  pausedAt=actx.currentTime;
  stopMusic();
  if(rafId) cancelAnimationFrame(rafId);
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='pauseOverlay';
  ov.innerHTML=`<div class="modal">
    <h2>⏸ 일시정지</h2>
    <div style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px;">🎶 ${escapeHtml(curSong.name)}</div>
    <button class="btn primary" style="width:100%;margin-bottom:10px;" onclick="resumeGame()">▶ 계속하기</button>
    <div class="btn-row">
      <button class="btn ghost" onclick="restartFromPause()">🔄 처음부터</button>
      <button class="btn ghost" onclick="quitGame()">🚪 나가기</button>
    </div>
  </div>`;
  document.getElementById('game').appendChild(ov);
}

function resumeGame(){
  if(!paused) return;
  paused=false;
  document.getElementById('pauseOverlay')?.remove();
  // 정지한 시간만큼 모든 노트 시각을 앞으로 밀어 싱크 유지
  const R = actx.currentTime + 0.15;
  const oldSongStart = songStart;
  const posAtPause = pausedAt - oldSongStart;   // 정지 시점의 곡 진행(초)
  const delta = R - pausedAt;                   // 정지에 머문 시간만큼 시프트
  songStart = oldSongStart + delta;
  for(const n of notes){ n.appearTime += delta; if(n.spawned && !n.done) n.deadline += delta; }
  // 음악 재개 (정지 위치부터)
  const bufPos = posAtPause + (curSong.offset||0);
  if(bufPos < curSong.buffer.duration - 0.05){
    const src=actx.createBufferSource(); src.buffer=curSong.buffer; src.connect(masterGain); src.start(R, bufPos); musicSource=src;
  }
  playing=true; loop();
}

function restartFromPause(){ paused=false; document.getElementById('pauseOverlay')?.remove(); retry(); }

function quitGame(){
  paused=false; playing=false;
  stopMusic();
  if(rafId) cancelAnimationFrame(rafId);
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; }
  document.getElementById('pauseOverlay')?.remove();
  document.getElementById('resOverlay')?.remove();
  document.getElementById('countdown')?.classList.add('hidden');
  document.querySelectorAll('.tap-timer').forEach(t=>t.remove());
  document.querySelectorAll('.pangi-stack').forEach(s=>s.remove());
  document.getElementById('game').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  loadLeaderboard();
}

function buildGrid(){
  const grid=document.getElementById('grid'); grid.innerHTML='';
  for(let i=0;i<HOLES;i++){
    const hole=document.createElement('div'); hole.className='hole'; hole.dataset.i=i;
    hole.innerHTML='<div class="clip"></div>';
    hole.addEventListener('pointerdown',e=>{ e.preventDefault(); onTap(i); });
    grid.appendChild(hole);
  }
}

/* 키보드 조작: E(좌상단) O(우상단) F(좌하단) K(우하단) */
const KEY_HOLE = { e:0, o:1, f:2, k:3 };
document.addEventListener('keydown', e=>{
  if(e.repeat) return;
  const hole = KEY_HOLE[e.key.toLowerCase()];
  if(hole===undefined) return;
  onTap(hole);
});

function beginSong(){
  const chart = genChartFor(curSong);
  startMusic(); // songStart 설정
  notes = chart.map((n,idx)=>{
    const base=songStart + n.b*BEAT;
    return { id:idx, hole:n.h, need:(n.c||1), got:0, appearTime:base, deadline:0,
      spawned:false, done:false, el:null, stackEl:null, timerEl:null };
  });
  totalTaps = notes.length;
  curLastBeat = Math.max(...chart.map(n=>n.b)) + Math.ceil(REACT_WINDOW/BEAT) + 1;
  playing=true; loop();
}

function loop(){
  if(!playing) return;
  const now=actx.currentTime;
  let activeCount = notes.reduce((s,m)=>s+(m.spawned && !m.done ? 1 : 0),0);
  for(const n of notes){
    if(n.done) continue;
    if(!n.spawned){
      // 항상 최소 한 칸은 비워둬서 계속 이어서 움직일 수 있도록 함
      if(now>=n.appearTime && activeCount<HOLES-1 && !notes.some(m=>m.spawned && !m.done && m.hole===n.hole)){
        spawnNote(n); activeCount++;
      }
      continue;
    }
    const remain = n.deadline - now;
    if(n.timerEl) n.timerEl.textContent = Math.max(0,Math.ceil(remain));
    if(remain<=0){ missNote(n); }
  }
  const elapsed=now-songStart, totalDur=curLastBeat*BEAT;
  document.getElementById('progressBar').style.width=Math.min(100, Math.max(0,elapsed/totalDur*100))+'%';
  if(now > songStart + curLastBeat*BEAT){ endSong(); return; }
  rafId=requestAnimationFrame(loop);
}

function spawnNote(n){
  n.spawned=true;
  n.deadline = actx.currentTime + REACT_WINDOW;
  const hole=document.querySelector(`.hole[data-i="${n.hole}"]`);
  const clip=hole.querySelector('.clip');
  const stack=document.createElement('div'); stack.className='pangi-stack';
  for(let k=0;k<n.need;k++){
    const p=document.createElement('div'); p.className='pangi '+colorFor(n.hole);
    p.innerHTML='<div class="eye l"></div><div class="eye r"></div>';
    stack.appendChild(p);
  }
  clip.appendChild(stack);
  const timer=document.createElement('div'); timer.className='tap-timer'; timer.textContent=Math.ceil(REACT_WINDOW); hole.appendChild(timer);
  n.timerEl=timer; n.stackEl=stack; n.el=hole;
  requestAnimationFrame(()=>stack.classList.add('up'));
}

function onTap(hole){
  if(!playing) return;
  const n = notes.find(x=>x.spawned && !x.done && x.hole===hole);
  if(!n) return;
  n.got++;
  if(n.stackEl && n.stackEl.lastElementChild){ n.stackEl.lastElementChild.remove(); }
  if(n.el){ n.el.classList.remove('flash'); void n.el.offsetWidth; n.el.classList.add('flash'); }
  hitPing();
  if(n.got>=n.need) successNote(n);
}

function successNote(n){
  if(n.done) return;
  n.done=true;
  score+=SCORE_GOOD; cGood++; popJudge(n,'GOOD','good');
  updateHUD();
  clearNoteVisual(n);
}
function missNote(n){
  if(n.done) return;
  n.done=true;
  cMiss++; popJudge(n,'MISS','miss'); missThud();
  updateHUD();
  clearNoteVisual(n);
}
function clearNoteVisual(n){
  if(n.timerEl){ n.timerEl.remove(); n.timerEl=null; }
  if(n.stackEl){ const s=n.stackEl; s.classList.remove('up'); s.classList.add('retract'); setTimeout(()=>s.remove(),200); n.stackEl=null; }
}
function popJudge(n,text,cls){
  if(!n.el) return;
  const p=document.createElement('div'); p.className='judge-pop judge-'+cls; p.textContent=text; n.el.appendChild(p); setTimeout(()=>p.remove(),500);
}
function updateHUD(){
  document.getElementById('scoreBig').textContent=score.toLocaleString();
  const maxScore=totalTaps*SCORE_GOOD || 1;
  document.getElementById('accLine').textContent='정확도 '+Math.min(100, score/maxScore*100).toFixed(1)+'%';
}

async function endSong(){
  playing=false; stopMusic();
  if(rafId) cancelAnimationFrame(rafId);
  const maxScore=totalTaps*SCORE_GOOD || 1;
  const acc=Math.min(100, score/maxScore*100);
  const grade = acc>=95?'S':acc>=85?'A':acc>=70?'B':acc>=50?'C':'D';
  const gradeColor = {S:'var(--gold-text)',A:'var(--green-text)',B:'var(--cyan-text)',C:'var(--muted)',D:'var(--pink-text)'}[grade];
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='resOverlay';
  ov.innerHTML=`<div class="modal">
    <h2>🎉 결과</h2>
    <div class="res-grade" style="color:${gradeColor}">${grade}</div>
    <div class="res-score">${score.toLocaleString()}</div>
    <div class="res-stats">
      <div class="st g">GOOD<b>${cGood}</b></div>
      <div class="st m">MISS<b>${cMiss}</b></div>
    </div>
    <div class="new-best hidden" id="newBest">🎉 신기록 달성!</div>
    <div class="res-rank" id="resRank">정확도 ${acc.toFixed(1)}%</div>
    <div class="btn-row">
      <button class="btn ghost" onclick="goHome()">랭킹 보기</button>
      <button class="btn gold" onclick="retry()">다시 도전</button>
    </div>
  </div>`;
  document.getElementById('game').appendChild(ov);
  tone(actx.currentTime,880,0.25,0.4,'triangle');

  try{
    const d=await apiScoreReq({nickname:me.nickname,score,mode:modeKey()});
    if(d.ok){
      if(d.isBest) document.getElementById('newBest').classList.remove('hidden');
      document.getElementById('resRank').innerHTML=`정확도 ${acc.toFixed(1)}% · 현재 <b>${d.myRank}위</b> · 최고점 ${d.best.toLocaleString()}`;
      renderRank(d.leaderboard);
    }
  }catch(e){ document.getElementById('resRank').textContent='서버 등록 실패 (오프라인)'; }
}

function goHome(){ stopMusic(); document.getElementById('resOverlay')?.remove(); document.getElementById('game').classList.add('hidden'); document.getElementById('home').classList.remove('hidden'); loadLeaderboard(); }
function retry(){ stopMusic(); document.getElementById('resOverlay')?.remove(); startGame(); }

let toastT;
function toast(m){ const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2000); }
setInterval(()=>{ if(!document.getElementById('home').classList.contains('hidden')) loadLeaderboard(); }, 12000);
</script>
</body>
