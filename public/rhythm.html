<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>팡이 리듬! 🎵</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;font-family:'Apple SD Gothic Neo','Malgun Gothic',sans-serif;}
  :root{--bg1:#1b2b4d;--gold:#ffce4a;--gold2:#ff9d2e;--green:#46d17e;--panel:#26346a;--panel2:#141f3f;--muted:#a8b8e6;--ink:#10182f;--pink:#ff6fa5;--cyan:#46d1d1;}
  html,body{height:100%;}
  body{background:radial-gradient(circle at 50% 0%,#3a4a99,var(--bg1) 60%,#0e1430);display:flex;align-items:center;justify-content:center;min-height:100vh;color:#fff;overflow:hidden;}
  .app{width:min(440px,100vw);height:100vh;max-height:900px;position:relative;display:flex;flex-direction:column;}
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;}
  .hidden{display:none!important;}
  .btn{padding:15px 20px;border:none;border-radius:14px;font-weight:900;font-size:16px;cursor:pointer;transition:.1s;}
  .btn:active{transform:translateY(3px);}
  .btn.primary{background:linear-gradient(180deg,#7be3a1,var(--green));color:#0a3a1f;box-shadow:0 5px 0 #2c9c58;}
  .btn.gold{background:linear-gradient(180deg,#ffe89a,var(--gold2));color:var(--ink);box-shadow:0 4px 0 #b86a12;}
  .btn.ghost{background:var(--panel);color:#fff;border:1px solid rgba(255,255,255,.2);}
  .btn:active{box-shadow:none;}

  /* ===== 로비 ===== */
  #lobby{align-items:center;justify-content:center;padding:24px;text-align:center;}
  .logo{font-size:38px;font-weight:900;text-shadow:0 4px 0 #2d4d9c,0 6px 10px rgba(0,0,0,.4);margin-bottom:4px;}
  .logo .note{display:inline-block;animation:bounce 1s ease-in-out infinite;}
  @keyframes bounce{50%{transform:translateY(-8px)}}
  .sub{color:var(--muted);font-size:14px;margin-bottom:24px;}
  .pangi-demo{display:flex;gap:14px;margin-bottom:26px;}
  .demo-dot{width:50px;height:50px;border-radius:50%;position:relative;animation:wob 1.4s ease-in-out infinite;}
  .demo-dot:nth-child(2){animation-delay:.2s}.demo-dot:nth-child(3){animation-delay:.4s}
  .demo-dot.white{background:radial-gradient(circle at 38% 30%,#fff,#9a90bb);}
  .demo-dot.black{background:radial-gradient(circle at 38% 30%,#5a5070,#100b1c);}
  .demo-dot.gold{background:radial-gradient(circle at 38% 30%,#fff3c0,#e08a18);box-shadow:0 0 14px rgba(255,206,74,.6);}
  .demo-dot .e{position:absolute;top:34%;width:10px;height:12px;background:#fff;border-radius:50%;}
  .demo-dot .e.l{left:26%}.demo-dot .e.r{right:26%}
  .demo-dot .e::after{content:'';position:absolute;top:32%;left:28%;width:4px;height:5px;background:#111;border-radius:50%;}
  .nick-input{width:100%;max-width:320px;padding:15px;border-radius:14px;border:2px solid rgba(255,255,255,.2);background:var(--panel2);color:#fff;font-size:17px;text-align:center;font-weight:700;margin-bottom:14px;}
  .nick-input:focus{outline:none;border-color:var(--gold);}
  .lobby-links{margin-top:18px;display:flex;gap:14px;font-size:13px;}
  .lobby-links a{color:var(--muted);text-decoration:none;border-bottom:1px dashed var(--muted);}

  /* ===== 헤더 ===== */
  .topbar{padding:14px 16px 4px;display:flex;align-items:center;justify-content:space-between;}
  .title{font-size:19px;font-weight:900;text-shadow:0 3px 0 #2d4d9c;display:flex;gap:6px;align-items:center;}
  .me-chip{background:var(--panel2);padding:6px 12px;border-radius:20px;font-size:12px;color:var(--muted);}
  .me-chip b{color:#fff;}
  .help-btn{width:32px;height:32px;border-radius:50%;border:none;cursor:pointer;background:linear-gradient(180deg,#ffe89a,var(--gold2));color:var(--ink);font-weight:900;font-size:17px;box-shadow:0 3px 0 #b86a12;}

  /* ===== 선택 UI (곡/난이도) ===== */
  .selectors{padding:2px 16px 0;}
  .sel-label{font-size:11px;color:var(--muted);font-weight:700;margin:8px 2px 5px;}
  .song-chips{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;scrollbar-width:thin;}
  .chip{flex:0 0 auto;min-width:82px;background:var(--panel);border:2px solid rgba(255,255,255,.1);border-radius:12px;padding:8px 10px;text-align:center;cursor:pointer;transition:.12s;}
  .chip.sel{border-color:var(--gold);background:linear-gradient(180deg,#3a4a8a,#26346a);box-shadow:0 0 12px rgba(255,206,74,.35);}
  .chip .c{font-size:22px;line-height:1;}
  .chip .n{font-size:11px;font-weight:700;margin-top:3px;white-space:nowrap;}
  .chip.add{display:flex;flex-direction:column;align-items:center;justify-content:center;color:var(--muted);border-style:dashed;}
  .diff-row{display:flex;gap:8px;}
  .diff-btn{flex:1;padding:9px 0;border-radius:10px;border:2px solid rgba(255,255,255,.1);background:var(--panel);color:#fff;font-weight:800;font-size:13px;cursor:pointer;transition:.12s;}
  .diff-btn .s{display:block;font-size:10px;color:var(--gold);margin-top:1px;}
  .diff-btn.sel{border-color:var(--gold);background:linear-gradient(180deg,#3a4a8a,#26346a);}

  /* ===== 홈 랭킹 ===== */
  .home-best{margin:8px 16px;background:linear-gradient(180deg,#2d3d7a,#1a2750);border-radius:14px;padding:10px 14px;font-size:13px;border:1px solid rgba(255,255,255,.1);display:flex;justify-content:space-between;align-items:center;}
  .home-best .sel-info{color:#fff;font-weight:800;}
  .home-best .best-info{color:var(--muted);}
  .home-best .best-info b{color:var(--gold);font-size:16px;}
  .rank-wrap{flex:1;margin:0 16px;background:var(--panel2);border-radius:16px;overflow:hidden;display:flex;flex-direction:column;border:1px solid rgba(255,255,255,.08);min-height:120px;}
  .rank-head{padding:10px 14px;font-size:13px;font-weight:800;color:var(--gold);border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;}
  .rank-list{flex:1;overflow-y:auto;}
  .rank-row{display:flex;align-items:center;gap:9px;padding:9px 12px;border-bottom:1px solid rgba(255,255,255,.05);font-size:13px;}
  .rank-row.me{background:rgba(255,206,74,.14);}
  .rk{width:26px;text-align:center;font-weight:900;color:var(--muted);}
  .rk.top1{color:#ffce4a}.rk.top2{color:#d9d9ec}.rk.top3{color:#e2935a}
  .avatar{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,#5a75d0,#2c4c8a);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;border:2px solid rgba(255,255,255,.15);}
  .badge{font-size:14px;width:18px;}
  .nick{flex:1;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .score{font-weight:900;font-variant-numeric:tabular-nums;}
  .reward{font-size:16px;width:22px;text-align:center;}
  .empty{padding:28px 20px;text-align:center;color:var(--muted);font-size:13px;line-height:1.5;}
  .play-area{padding:12px 16px 18px;display:flex;gap:10px;}
  .play-btn{flex:1;padding:16px;border:none;border-radius:18px;cursor:pointer;background:linear-gradient(180deg,#ffd76b,var(--gold2));color:var(--ink);font-size:18px;font-weight:900;box-shadow:0 5px 0 #b86a12;}
  .play-btn:active{transform:translateY(4px);box-shadow:none;}
  .refresh-btn{width:54px;border:none;border-radius:18px;background:var(--panel);color:#fff;font-size:20px;cursor:pointer;box-shadow:0 5px 0 #0c1430;}
  .refresh-btn:active{transform:translateY(4px);box-shadow:none;}

  /* ===== 게임 ===== */
  #game{background:radial-gradient(circle at 50% 25%,#2a3a6e,#0e1430);}
  .game-hud{padding:12px 16px 4px;display:flex;justify-content:space-between;align-items:flex-start;}
  .hud-l .score-big{font-size:28px;font-weight:900;font-variant-numeric:tabular-nums;line-height:1;}
  .hud-l .acc{font-size:12px;color:var(--muted);margin-top:2px;}
  .hud-r{text-align:right;margin-right:44px;}
  .pause-btn{position:absolute;top:12px;right:14px;z-index:20;width:38px;height:38px;border-radius:10px;border:none;background:var(--panel2);color:#fff;font-size:15px;cursor:pointer;box-shadow:0 3px 0 #0c1430;}
  .pause-btn:active{transform:translateY(2px);box-shadow:none;}
  .hud-r .combo{font-size:30px;font-weight:900;color:var(--gold);line-height:1;}
  .hud-r .combo small{font-size:13px;color:var(--muted);}
  .progress{height:6px;margin:6px 16px 0;background:var(--panel2);border-radius:4px;overflow:hidden;}
  .progress .bar{height:100%;width:0;background:linear-gradient(90deg,var(--cyan),var(--gold));transition:width .1s linear;}
  .song-name-mini{text-align:center;font-size:12px;color:var(--muted);margin-top:6px;}

  .grid-wrap{flex:1;display:flex;align-items:center;justify-content:center;padding:10px;}
  .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;width:min(360px,90vw);}
  .hole{aspect-ratio:1;border-radius:50%;background:radial-gradient(circle at 50% 35%,#16203e 40%,#0a1228 100%);box-shadow:inset 0 8px 18px rgba(0,0,0,.8),inset 0 -3px 6px rgba(80,110,200,.25);position:relative;overflow:visible;display:flex;align-items:center;justify-content:center;cursor:pointer;}
  .hole .clip{position:absolute;inset:0;border-radius:50%;overflow:hidden;display:flex;align-items:flex-end;justify-content:center;}
  .hole::after{content:'';position:absolute;left:8%;right:8%;top:6%;height:30%;border-radius:50%;background:radial-gradient(ellipse at 50% 0%,rgba(0,0,0,.6),transparent 70%);pointer-events:none;z-index:5;}
  .hole.flash{animation:holeFlash .25s ease-out;}
  @keyframes holeFlash{0%{box-shadow:inset 0 8px 18px rgba(0,0,0,.8),0 0 0 0 var(--gold)}100%{box-shadow:inset 0 8px 18px rgba(0,0,0,.8),0 0 0 14px rgba(255,206,74,0)}}

  /* 접근 링 (타이밍 가이드) */
  .ring{position:absolute;left:50%;top:50%;width:100%;height:100%;border-radius:50%;border:4px solid var(--cyan);transform:translate(-50%,-50%) scale(2);opacity:0;pointer-events:none;z-index:6;}
  .ring.show{opacity:.9;}
  .ring.next{border-width:5px;box-shadow:0 0 10px rgba(70,209,209,.6);}
  .ring.perfectzone{border-color:var(--gold);box-shadow:0 0 14px rgba(255,206,74,.8);}

  /* 팡이 */
  .pangi-stack{position:absolute;bottom:-110%;display:flex;transition:bottom .18s cubic-bezier(.34,1.56,.64,1);padding-bottom:8%;z-index:4;}
  .pangi-stack.up{bottom:6%;}
  .pangi-stack.retract{bottom:-120%;transition:bottom .18s ease-in;}
  .pangi{width:44px;height:44px;border-radius:50%;position:relative;margin:0 -7px;box-shadow:0 4px 8px rgba(0,0,0,.4);animation:wob 1.2s ease-in-out infinite;}
  @keyframes wob{0%,100%{transform:rotate(-4deg)}50%{transform:rotate(4deg)}}
  .pangi.white{background:radial-gradient(circle at 38% 30%,#fff,#c9c2dd 75%,#9a90bb);}
  .pangi.black{background:radial-gradient(circle at 38% 30%,#5a5070,#211a33 75%,#100b1c);}
  .pangi.gold{background:radial-gradient(circle at 38% 30%,#fff3c0,#ffce4a 60%,#e08a18);box-shadow:0 0 14px rgba(255,206,74,.7);}
  .pangi .eye{position:absolute;top:34%;width:10px;height:12px;background:#fff;border-radius:50%;}
  .pangi .eye.l{left:26%}.pangi .eye.r{right:26%}
  .pangi .eye::after{content:'';position:absolute;top:32%;left:28%;width:4px;height:5px;background:#111;border-radius:50%;}

  .judge-pop{position:absolute;left:50%;top:40%;transform:translateX(-50%);font-weight:900;font-size:18px;pointer-events:none;z-index:8;animation:jp .5s ease-out forwards;text-shadow:0 2px 4px #000;}
  @keyframes jp{0%{opacity:0;transform:translate(-50%,4px) scale(.6)}30%{opacity:1}100%{opacity:0;transform:translate(-50%,-22px) scale(1.1)}}
  .judge-perfect{color:var(--gold)} .judge-good{color:var(--cyan)} .judge-miss{color:var(--pink)}

  .countdown{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;z-index:30;font-size:90px;font-weight:900;color:#fff;text-shadow:0 0 30px var(--gold);}

  /* 모달 */
  .overlay{position:absolute;inset:0;background:rgba(8,12,30,.85);backdrop-filter:blur(3px);display:flex;align-items:center;justify-content:center;z-index:40;padding:20px;}
  .modal{width:100%;max-width:340px;background:linear-gradient(180deg,#2d3d7a,#1a2750);border-radius:22px;padding:22px;border:1px solid rgba(255,255,255,.12);box-shadow:0 20px 50px rgba(0,0,0,.6);}
  .modal h2{text-align:center;font-size:20px;margin-bottom:14px;color:var(--gold);}
  .res-score{text-align:center;font-size:40px;font-weight:900;color:var(--gold);}
  .res-grade{text-align:center;font-size:54px;font-weight:900;margin:4px 0;}
  .res-stats{display:flex;justify-content:space-around;background:var(--panel2);border-radius:12px;padding:12px;margin:12px 0;}
  .res-stats .st{text-align:center;font-size:11px;color:var(--muted);}
  .res-stats .st b{display:block;font-size:18px;margin-top:2px;}
  .res-stats .st.p b{color:var(--gold)}.res-stats .st.g b{color:var(--cyan)}.res-stats .st.m b{color:var(--pink)}
  .res-rank{text-align:center;font-size:14px;margin-bottom:12px;}
  .res-rank b{color:var(--gold);font-size:20px;}
  .new-best{text-align:center;color:var(--green);font-weight:900;font-size:14px;margin-bottom:6px;animation:pulse 1s infinite;}
  @keyframes pulse{50%{opacity:.5}}
  .btn-row{display:flex;gap:10px;margin-top:6px;}
  .btn-row .btn{flex:1;}
  .fld{display:flex;justify-content:space-between;align-items:center;font-size:13px;margin:8px 0;color:#e6ecff;}
  .fld input{width:110px;padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,.2);background:var(--panel2);color:#fff;text-align:center;font-size:14px;}
  .help-step{display:flex;gap:12px;margin-bottom:13px;align-items:flex-start;}
  .help-step .n{width:25px;height:25px;flex-shrink:0;border-radius:50%;background:var(--gold);color:var(--ink);font-weight:900;display:flex;align-items:center;justify-content:center;font-size:13px;}
  .help-step .txt{font-size:13px;line-height:1.5;color:#e6ecff;}
  .help-step .txt b{color:var(--gold);}
  .toast{position:absolute;bottom:90px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.85);padding:10px 18px;border-radius:20px;font-size:13px;z-index:60;opacity:0;transition:.3s;white-space:nowrap;}
  .toast.show{opacity:1;}
</style>
</head>
<body>
<div class="app">

  <!-- ===== 로비 ===== -->
  <div class="screen" id="lobby">
    <div class="logo">🎵 팡이 리듬<span class="note">♪</span></div>
    <div class="sub">노래 박자에 맞춰 팡이를 터치하세요</div>
    <div class="pangi-demo">
      <div class="demo-dot white"><div class="e l"></div><div class="e r"></div></div>
      <div class="demo-dot black"><div class="e l"></div><div class="e r"></div></div>
      <div class="demo-dot gold"><div class="e l"></div><div class="e r"></div></div>
    </div>
    <input class="nick-input" id="nickInput" maxlength="12" placeholder="닉네임을 입력하세요" autocomplete="off">
    <button class="btn primary" style="width:100%;max-width:320px;" onclick="enter()">입장하기 ▶</button>
    <div class="lobby-links"><a href="index.html">🕳️ 팡이 잡기 모드</a></div>
  </div>

  <!-- ===== 홈 ===== -->
  <div class="screen hidden" id="home">
    <div class="topbar">
      <div class="title">🎵 팡이 리듬</div>
      <div style="display:flex;gap:8px;align-items:center;">
        <button class="help-btn" onclick="backToLobby()" title="로비로 돌아가기">🚪</button>
        <span class="me-chip">👤 <b id="meNick">-</b></span>
        <button class="help-btn" onclick="openHelp()">?</button>
      </div>
    </div>

    <div class="selectors">
      <div class="sel-label">🎼 곡 선택</div>
      <div class="song-chips" id="songChips"></div>
      <div class="sel-label">🎚️ 난이도</div>
      <div class="diff-row" id="diffRow"></div>
    </div>

    <div class="home-best">
      <span class="sel-info" id="selInfo">팡이 비트 · 보통</span>
      <span class="best-info" id="bestInfo">내 최고 <b id="myBest">0</b> <span id="myRankLine"></span></span>
    </div>

    <div class="rank-wrap">
      <div class="rank-head"><span>🏆 랭킹</span><span id="totalPlayers">0명 참가</span></div>
      <div class="rank-list" id="rankList"><div class="empty">불러오는 중...</div></div>
    </div>

    <div class="play-area">
      <button class="play-btn" onclick="startGame()">🎵 플레이 시작</button>
      <button class="refresh-btn" onclick="loadLeaderboard()" title="새로고침">🔄</button>
    </div>
  </div>

  <!-- ===== 게임 ===== -->
  <div class="screen hidden" id="game">
    <button class="pause-btn" id="pauseBtn" onclick="pauseGame()">⏸</button>
    <div class="game-hud">
      <div class="hud-l"><div class="score-big" id="scoreBig">0</div><div class="acc" id="accLine">정확도 100.0%</div></div>
      <div class="hud-r"><div class="combo"><span id="comboNum">0</span><small> COMBO</small></div></div>
    </div>
    <div class="progress"><div class="bar" id="progressBar"></div></div>
    <div class="song-name-mini" id="gameSong">🎶 팡이 비트</div>
    <div class="grid-wrap"><div class="grid" id="grid"></div></div>
    <div class="countdown hidden" id="countdown"></div>
  </div>

</div>
<input type="file" id="fileInput" accept="audio/*" hidden>
<div class="toast" id="toast"></div>

<script>
/* ========================================================================
   상태 / 설정
======================================================================== */
let me = { nickname:'' };
const LEAD = 0.95;              // 팡이 등장 후 타격 지점까지(s)
const W_PERFECT = 0.085;        // ±0.085s = PERFECT
const W_GOOD    = 0.18;         // ±0.18s = GOOD (그 밖은 MISS)
const MULTI_GAP_BEAT = 0.5;     // 연타 팡이 간격(박)
const SCORE = { perfect:300, good:100 };

/* ------------------------------------------------------------------------
   곡 목록
   - kind:'synth'  → WebAudio로 즉석 생성하는 내장곡(파일 불필요)
   - kind:'file'   → 실제 음원. src(서버 경로) 또는 buffer(유저 업로드)
   실제 mp3를 추가하려면 public/songs/에 파일을 넣고 아래에 한 줄 추가:
     { id:'mysong', name:'곡이름', cover:'🎵', kind:'file', src:'songs/mysong.mp3',
       bpm:128, offset:0, lengthBeats:120, ranked:true }
------------------------------------------------------------------------ */
const SONGS = [
  { id:'pangibeat', name:'팡이 비트', cover:'🎶', kind:'synth', bpm:120, offset:0, lengthBeats:64, ranked:true },
  // 예시(파일을 넣으면 활성화):
  // { id:'demo', name:'데모곡', cover:'🎵', kind:'file', src:'songs/demo.mp3', bpm:128, offset:0, lengthBeats:140, ranked:true },
];

/* 난이도 프리셋 — 곡 길이에 맞춰 채보를 결정론적으로 생성 */
const DIFFICULTIES = {
  easy:   { label:'쉬움',   stars:'★☆☆', step:2, multiChance:0,    maxMulti:1, eighthChance:0 },
  normal: { label:'보통',   stars:'★★☆', step:1, multiChance:0.18, maxMulti:2, eighthChance:0.12 },
  hard:   { label:'어려움', stars:'★★★', step:1, multiChance:0.32, maxMulti:3, eighthChance:0.45 },
};

let curSong = SONGS[0];
let curDiff = 'normal';
let BEAT = 60 / curSong.bpm;

function colorFor(hole){ return ['white','black','gold','black','gold','white','gold','white','black'][hole]; }
function modeKey(){ return `rhythm:${curSong.id}:${curDiff}`; }

/* 결정론적 의사난수 (같은 곡·난이도는 항상 같은 채보) */
function hash01(i){ const x=Math.sin(i*12.9898+78.233)*43758.5453; return x-Math.floor(x); }

/* 채보 생성 */
function genChart(lengthBeats, diffKey){
  const D = DIFFICULTIES[diffKey];
  const chart=[]; const lastHoleBeat={}; const MIN_GAP=3; let seed=0;
  const pickHole=(beat, base)=>{
    let hole=Math.floor(hash01(base)*9)%9, guard=0;
    while(guard<9 && lastHoleBeat[hole]!==undefined && (beat-lastHoleBeat[hole])<MIN_GAP){ hole=(hole+1)%9; guard++; }
    lastHoleBeat[hole]=beat; return hole;
  };
  for(let b=4; b<=lengthBeats-2; b+=D.step){
    seed++;
    const hole=pickHole(b, seed*1.7);
    let c=1;
    if(hash01(seed*3.3) < D.multiChance){ c = (D.maxMulti>=3 && hash01(seed*5.1)<0.4) ? 3 : 2; }
    chart.push({b, h:hole, c});
    // 어려움: 엇박(반 박) 노트 추가
    if(D.eighthChance>0 && hash01(seed*7.7)<D.eighthChance){
      const h2=pickHole(b+0.5, seed*9.2+1);
      chart.push({b:b+0.5, h:h2, c:1});
    }
  }
  return chart;
}

const MELODY = [523.25, 587.33, 659.25, 783.99, 880.00, 783.99, 659.25, 587.33];

/* ========================================================================
   WebAudio
======================================================================== */
let actx, masterGain, noiseBuf, musicSource=null;
function initAudio(){
  if(actx) return;
  actx = new (window.AudioContext||window.webkitAudioContext)();
  masterGain = actx.createGain(); masterGain.gain.value = 0.6; masterGain.connect(actx.destination);
  noiseBuf = actx.createBuffer(1, actx.sampleRate*0.3, actx.sampleRate);
  const d = noiseBuf.getChannelData(0);
  for(let i=0;i<d.length;i++) d[i] = Math.random()*2-1;
}
function env(gain,t,a,peak,d){ gain.setValueAtTime(0,t); gain.linearRampToValueAtTime(peak,t+a); gain.exponentialRampToValueAtTime(0.0001,t+a+d); }
function kick(t){ const o=actx.createOscillator(),g=actx.createGain(); o.connect(g);g.connect(masterGain); o.frequency.setValueAtTime(150,t); o.frequency.exponentialRampToValueAtTime(45,t+0.12); env(g.gain,t,0.001,0.9,0.18); o.start(t);o.stop(t+0.2); }
function snare(t){ const n=actx.createBufferSource();n.buffer=noiseBuf; const f=actx.createBiquadFilter();f.type='highpass';f.frequency.value=1200; const g=actx.createGain(); n.connect(f);f.connect(g);g.connect(masterGain); env(g.gain,t,0.001,0.35,0.14); n.start(t);n.stop(t+0.16); }
function hat(t){ const n=actx.createBufferSource();n.buffer=noiseBuf; const f=actx.createBiquadFilter();f.type='highpass';f.frequency.value=7000; const g=actx.createGain(); n.connect(f);f.connect(g);g.connect(masterGain); env(g.gain,t,0.001,0.12,0.04); n.start(t);n.stop(t+0.05); }
function tone(t,freq,peak,dur,type){ const o=actx.createOscillator(),g=actx.createGain(); o.type=type||'triangle';o.frequency.value=freq; o.connect(g);g.connect(masterGain); env(g.gain,t,0.005,peak,dur); o.start(t);o.stop(t+dur+0.05); }
function hitPing(){ if(!actx)return; tone(actx.currentTime,1320,0.25,0.12,'square'); }
function missThud(){ if(!actx)return; tone(actx.currentTime,160,0.2,0.12,'sawtooth'); }

/* 내장곡 합성 스케줄러 */
let songStart=0, nextBeat=0, schedulerId=null;
function scheduleAudio(){
  const ahead = actx.currentTime + 0.12;
  while(songStart + nextBeat*BEAT < ahead){
    const t = songStart + nextBeat*BEAT;
    const ib = Math.round(nextBeat);
    if(Math.abs(nextBeat - ib) < 0.01){
      kick(t);
      if(ib % 2 === 1) snare(t);
      tone(t, MELODY[ib % MELODY.length], 0.14, 0.32, 'triangle');
      if(ib % 4 === 0) tone(t, MELODY[ib%MELODY.length]/2, 0.16, 0.45, 'sine');
    }
    hat(t);
    nextBeat += 0.5;
  }
}

/* 음악 시작/정지 — 게임 시계(songStart)를 음악 시작에 맞춤 */
function startMusic(){
  if(curSong.kind==='file' && curSong.buffer){
    const src=actx.createBufferSource(); src.buffer=curSong.buffer; src.connect(masterGain);
    const at=actx.currentTime+0.15; src.start(at); musicSource=src;
    songStart = at + (curSong.offset||0);
  } else { // synth
    songStart = actx.currentTime + 0.15;
    nextBeat=0; scheduleAudio(); schedulerId=setInterval(scheduleAudio,25);
  }
}
function stopMusic(){
  if(schedulerId){ clearInterval(schedulerId); schedulerId=null; }
  if(musicSource){ try{ musicSource.stop(); }catch(e){} musicSource=null; }
}

// file:// 또는 정적 호스팅(GitHub Pages 등)이면 서버 대신 브라우저 저장소 사용
const IS_FILE = location.protocol === 'file:' || /github\.io$/.test(location.hostname);
const LS_KEY = 'pangi_scores_v1';
function lsAll(){ try{ return JSON.parse(localStorage.getItem(LS_KEY))||{}; }catch(e){ return {}; } }
function lsSave(o){ try{ localStorage.setItem(LS_KEY, JSON.stringify(o)); }catch(e){} }
function localBoard(mode){
  const s=(lsAll()[mode])||{};
  return Object.entries(s).map(([nickname,v])=>({nickname,score:v.score,plays:v.plays||1}))
    .sort((a,b)=>b.score-a.score).slice(0,100).map((r,i)=>({rank:i+1,...r}));
}
function localSubmit(mode,nickname,score){
  const db=lsAll(); const s=db[mode]||(db[mode]={});
  const cur=s[nickname]||{score:0,plays:0}; const isBest=score>cur.score;
  s[nickname]={score:isBest?score:cur.score, plays:(cur.plays||0)+1}; lsSave(db);
  const lb=localBoard(mode); const mr=(lb.find(r=>r.nickname===nickname)||{}).rank||null;
  return {ok:true,isBest,best:s[nickname].score,myRank:mr,leaderboard:lb,total:lb.length};
}
async function apiLeaderboardReq(mode){
  if(IS_FILE) return {ok:true,leaderboard:localBoard(mode),total:localBoard(mode).length};
  try{ const r=await fetch('/api/leaderboard?mode='+encodeURIComponent(mode)); return await r.json(); }
  catch(e){ return {ok:true,leaderboard:localBoard(mode),total:localBoard(mode).length}; }
}
async function apiScoreReq(payload){
  if(IS_FILE) return localSubmit(payload.mode,payload.nickname,payload.score);
  try{ const r=await fetch('/api/score',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(payload)}); return await r.json(); }

let notes=[], rafId=null, playing=false, paused=false, pausedAt=0, countdownTimer=null, curLastBeat=64;
let score=0, combo=0, maxCombo=0, cPerfect=0, cGood=0, cMiss=0, totalTaps=0;

function startGame(){
  initAudio();
  if(actx.state==='suspended') actx.resume();
  paused=false;
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; }
  document.getElementById('home').classList.add('hidden');
  document.getElementById('game').classList.remove('hidden');
  document.getElementById('gameSong').textContent=`🎶 ${curSong.name} · ${DIFFICULTIES[curDiff].label}`;
  buildGrid();
  score=0;combo=0;maxCombo=0;cPerfect=0;cGood=0;cMiss=0;totalTaps=0;
  updateHUD();
  const cd=document.getElementById('countdown'); cd.classList.remove('hidden');
  let n=3; cd.textContent=n; tone(actx.currentTime,660,0.2,0.2,'square');
  countdownTimer=setInterval(()=>{ n--;
    if(n>0){ cd.textContent=n; tone(actx.currentTime,660,0.2,0.2,'square'); }
    else { clearInterval(countdownTimer); countdownTimer=null; cd.textContent='START!'; tone(actx.currentTime,990,0.25,0.3,'square'); setTimeout(()=>cd.classList.add('hidden'),500); beginSong(); }
  },700);
}

/* ===== 일시정지 / 재개 / 나가기 ===== */
function pauseGame(){
  if(!playing || paused) return;
  paused=true; playing=false;
  pausedAt=actx.currentTime;
  stopMusic();
  if(rafId) cancelAnimationFrame(rafId);
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='pauseOverlay';
  ov.innerHTML=`<div class="modal">
    <h2>⏸ 일시정지</h2>
    <div style="text-align:center;color:var(--muted);font-size:13px;margin-bottom:16px;">🎶 ${escapeHtml(curSong.name)} · ${DIFFICULTIES[curDiff].label}</div>
    <button class="btn primary" style="width:100%;margin-bottom:10px;" onclick="resumeGame()">▶ 계속하기</button>
    <div class="btn-row">
      <button class="btn ghost" onclick="restartFromPause()">🔄 처음부터</button>
      <button class="btn ghost" onclick="quitGame()">🚪 나가기</button>
    </div>
  </div>`;
  document.getElementById('game').appendChild(ov);
}

function resumeGame(){
  if(!paused) return;
  paused=false;
  document.getElementById('pauseOverlay')?.remove();
  // 정지한 시간만큼 모든 노트 시각을 앞으로 밀어 싱크 유지
  const R = actx.currentTime + 0.15;
  const oldSongStart = songStart;
  const posAtPause = pausedAt - oldSongStart;   // 정지 시점의 곡 진행(초)
  const delta = R - pausedAt;                   // 정지에 머문 시간만큼 시프트
  songStart = oldSongStart + delta;
  for(const n of notes){ n.appearTime += delta; for(const h of n.hits) h.time += delta; }
  // 음악 재개 (정지 위치부터)
  if(curSong.kind==='file' && curSong.buffer){
    const bufPos = posAtPause + (curSong.offset||0);
    if(bufPos < curSong.buffer.duration - 0.05){
      const src=actx.createBufferSource(); src.buffer=curSong.buffer; src.connect(masterGain); src.start(R, bufPos); musicSource=src;
    }
  } else {
    scheduleAudio(); schedulerId=setInterval(scheduleAudio,25);
  }
  playing=true; loop();
}

function restartFromPause(){ paused=false; document.getElementById('pauseOverlay')?.remove(); retry(); }

function quitGame(){
  paused=false; playing=false;
  stopMusic();
  if(rafId) cancelAnimationFrame(rafId);
  if(countdownTimer){ clearInterval(countdownTimer); countdownTimer=null; }
  document.getElementById('pauseOverlay')?.remove();
  document.getElementById('resOverlay')?.remove();
  document.getElementById('countdown')?.classList.add('hidden');
  document.querySelectorAll('.ring').forEach(r=>r.remove());
  document.querySelectorAll('.pangi-stack').forEach(s=>s.remove());
  document.getElementById('game').classList.add('hidden');
  document.getElementById('home').classList.remove('hidden');
  loadLeaderboard();
}

function buildGrid(){
  const grid=document.getElementById('grid'); grid.innerHTML='';
  for(let i=0;i<9;i++){
    const hole=document.createElement('div'); hole.className='hole'; hole.dataset.i=i;
    hole.innerHTML='<div class="clip"></div>';
    hole.addEventListener('pointerdown',e=>{ e.preventDefault(); onTap(i); });
    grid.appendChild(hole);
  }
}

function beginSong(){
  const chart = genChart(curSong.lengthBeats, curDiff);
  const GAP = MULTI_GAP_BEAT * BEAT;
  startMusic(); // songStart 설정
  notes = chart.map((n,idx)=>{
    const hole=n.h, count=n.c||1;
    const base=songStart + n.b*BEAT;
    const hits=[]; for(let k=0;k<count;k++) hits.push({ time:base+k*GAP, done:false, ring:null, pangi:null });
    return { id:idx, hole, count, hits, appearTime:base-LEAD, spawned:false, done:false, el:null, stackEl:null };
  });
  totalTaps = notes.reduce((s,n)=>s+n.count,0);
  curLastBeat = Math.max(...chart.map(n=>n.b + (n.c>1?(n.c-1)*MULTI_GAP_BEAT:0))) + 2;
  playing=true; loop();
}

function loop(){
  if(!playing) return;
  const now=actx.currentTime;
  for(const n of notes){
    if(n.done) continue;
    if(!n.spawned && now>=n.appearTime){ spawnNote(n); }
    if(n.spawned){
      let nextIdx=-1;
      for(let k=0;k<n.hits.length;k++){ if(!n.hits[k].done){ nextIdx=k; break; } }
      for(let k=0;k<n.hits.length;k++){
        const h=n.hits[k]; if(h.done||!h.ring) continue;
        const scale = 1 + Math.max(0, Math.min(1.7, (h.time - now)/LEAD));
        h.ring.style.transform = `translate(-50%,-50%) scale(${scale})`;
        const isNext = (k===nextIdx);
        h.ring.style.opacity = isNext ? '0.95' : '0.35';
        h.ring.classList.toggle('next', isNext);
        h.ring.classList.toggle('perfectzone', isNext && Math.abs(now-h.time)<=W_PERFECT);
        if(now > h.time + W_GOOD){ missHit(n,h); }
      }
      if(n.hits.every(h=>h.done)) clearNote(n);
    }
  }
  const elapsed=now-songStart, totalDur=curLastBeat*BEAT;
  document.getElementById('progressBar').style.width=Math.min(100, Math.max(0,elapsed/totalDur*100))+'%';
  if(now > songStart + curLastBeat*BEAT){ endSong(); return; }
  rafId=requestAnimationFrame(loop);
}

function spawnNote(n){
  n.spawned=true;
  const hole=document.querySelector(`.hole[data-i="${n.hole}"]`);
  const clip=hole.querySelector('.clip');
  const stack=document.createElement('div'); stack.className='pangi-stack';
  for(let k=0;k<n.count;k++){
    const p=document.createElement('div'); p.className='pangi '+colorFor(n.hole);
    p.innerHTML='<div class="eye l"></div><div class="eye r"></div>';
    stack.appendChild(p); n.hits[k].pangi=p;
  }
  clip.appendChild(stack);
  for(let k=0;k<n.count;k++){
    const ring=document.createElement('div'); ring.className='ring show'; hole.appendChild(ring);
    n.hits[k].ring=ring;
  }
  n.stackEl=stack; n.el=hole;
  requestAnimationFrame(()=>stack.classList.add('up'));
}

function onTap(hole){
  if(!playing) return;
  const now=actx.currentTime;
  let tNote=null, tHit=null, bestDiff=Infinity;
  for(const n of notes){
    if(n.done || !n.spawned || n.hole!==hole) continue;
    let h=null; for(const hh of n.hits){ if(!hh.done){ h=hh; break; } }
    if(!h) continue;
    if(now < h.time - W_GOOD) continue;
    const diff=Math.abs(now-h.time);
    if(diff<bestDiff){ bestDiff=diff; tNote=n; tHit=h; }
  }
  if(!tHit) return;
  const judge = bestDiff<=W_PERFECT ? 'perfect' : 'good';
  applyHit(tNote, judge);
  resolveHit(tHit);
  if(tNote.el){ tNote.el.classList.remove('flash'); void tNote.el.offsetWidth; tNote.el.classList.add('flash'); }
  hitPing();
  if(tNote.hits.every(h=>h.done)) clearNote(tNote);
}

function applyHit(n, judge){
  if(judge==='perfect'){ score+=SCORE.perfect; cPerfect++; combo++; popJudge(n,'PERFECT','perfect'); }
  else { score+=SCORE.good; cGood++; combo++; popJudge(n,'GOOD','good'); }
  score += Math.floor(combo/10)*5;
  maxCombo=Math.max(maxCombo,combo);
  updateHUD();
}
function missHit(n,h){
  if(h.done) return;
  cMiss++; combo=0; popJudge(n,'MISS','miss'); missThud();
  resolveHit(h); updateHUD();
}
function resolveHit(h){
  h.done=true;
  if(h.ring){ h.ring.remove(); h.ring=null; }
  if(h.pangi){ h.pangi.remove(); h.pangi=null; }
}
function clearNote(n){
  if(n.done) return;
  n.done=true;
  for(const h of n.hits){ if(h.ring){ h.ring.remove(); h.ring=null; } }
  if(n.stackEl){ const s=n.stackEl; s.classList.remove('up'); s.classList.add('retract'); setTimeout(()=>s.remove(),200); n.stackEl=null; }
}
function popJudge(n,text,cls){
  if(!n.el) return;
  const p=document.createElement('div'); p.className='judge-pop judge-'+cls; p.textContent=text; n.el.appendChild(p); setTimeout(()=>p.remove(),500);
}
function updateHUD(){
  document.getElementById('scoreBig').textContent=score.toLocaleString();
  document.getElementById('comboNum').textContent=combo;
  const maxScore=totalTaps*SCORE.perfect || 1;
  document.getElementById('accLine').textContent='정확도 '+Math.min(100, score/maxScore*100).toFixed(1)+'%';
}

async function endSong(){
  playing=false; stopMusic();
  if(rafId) cancelAnimationFrame(rafId);
  const maxScore=totalTaps*SCORE.perfect || 1;
  const acc=Math.min(100, score/maxScore*100);
  const grade = acc>=95?'S':acc>=85?'A':acc>=70?'B':acc>=50?'C':'D';
  const gradeColor = {S:'#ffce4a',A:'#46d17e',B:'#46d1d1',C:'#a8b8e6',D:'#ff6fa5'}[grade];
  const ov=document.createElement('div'); ov.className='overlay'; ov.id='resOverlay';
  ov.innerHTML=`<div class="modal">
    <h2>🎉 결과</h2>
    <div class="res-grade" style="color:${gradeColor}">${grade}</div>
    <div class="res-score">${score.toLocaleString()}</div>
    <div class="res-stats">
      <div class="st p">PERFECT<b>${cPerfect}</b></div>
      <div class="st g">GOOD<b>${cGood}</b></div>
      <div class="st m">MISS<b>${cMiss}</b></div>
      <div class="st">MAX COMBO<b>${maxCombo}</b></div>
    </div>
    <div class="new-best hidden" id="newBest">🎉 신기록 달성!</div>
    <div class="res-rank" id="resRank">정확도 ${acc.toFixed(1)}%</div>
    <div class="btn-row">
      <button class="btn ghost" onclick="goHome()">랭킹 보기</button>
      <button class="btn gold" onclick="retry()">다시 도전</button>
    </div>
  </div>`;
  document.getElementById('game').appendChild(ov);
  tone(actx.currentTime,880,0.25,0.4,'triangle');

  if(!curSong.ranked){
    document.getElementById('resRank').innerHTML=`정확도 ${acc.toFixed(1)}% · 🎧 내 음원(랭킹 미반영)`;
    return;
  }
  try{
    const d=await apiScoreReq({nickname:me.nickname,score,mode:modeKey()});
    if(d.ok){
      if(d.isBest) document.getElementById('newBest').classList.remove('hidden');
      document.getElementById('resRank').innerHTML=`정확도 ${acc.toFixed(1)}% · 현재 <b>${d.myRank}위</b> · 최고점 ${d.best.toLocaleString()}`;
      renderRank(d.leaderboard,d.leaderboard.length);
    }
  }catch(e){ document.getElementById('resRank').textContent='서버 등록 실패 (오프라인)'; }
}

function goHome(){ stopMusic(); document.getElementById('resOverlay')?.remove(); document.getElementById('game').classList.add('hidden'); document.getElementById('home').classList.remove('hidden'); loadLeaderboard(); }
function retry(){ stopMusic(); document.getElementById('resOverlay')?.remove(); startGame(); }

function openHelp(){
  const ov=document.createElement('div');ov.className='overlay';ov.id='helpOverlay';
  ov.innerHTML=`<div class="modal" style="max-height:84vh;overflow-y:auto;">
    <h2>📖 플레이 방법</h2>
    <div class="help-step"><div class="n">1</div><div class="txt"><b>곡</b>과 <b>난이도</b>(쉬움/보통/어려움)를 고르고 플레이하세요. <b>＋내 MP3</b>로 내 음악도 불러올 수 있어요(연습용).</div></div>
    <div class="help-step"><div class="n">2</div><div class="txt">노래 박자에 맞춰 9칸에서 팡이가 등장하고, 감싼 <b>링이 줄어들어요</b>. 링이 딱 맞는 순간 터치 → <b style="color:#ffce4a">PERFECT</b>!</div></div>
    <div class="help-step"><div class="n">3</div><div class="txt">살짝 어긋나면 <b style="color:#46d1d1">GOOD</b>, 놓치면 <b style="color:#ff6fa5">MISS</b>. <b>체력은 줄지 않아요</b> — 곡은 끝까지 진행됩니다.</div></div>
    <div class="help-step"><div class="n">4</div><div class="txt">한 칸에 팡이가 <b>여러 마리</b>면 <b>링도 마리 수만큼</b> 차례로 닫혀요. 순서대로 탁-탁-탁 연달아 터치!</div></div>
    <div class="help-step"><div class="n">5</div><div class="txt">최종 점수와 등급(S~D)이 <b>곡·난이도별 랭킹</b>에 반영돼요.</div></div>
    <div class="btn-row"><button class="btn primary" onclick="document.getElementById('helpOverlay').remove()">확인</button></div>
  </div>`;
  document.querySelector('.app').appendChild(ov);
}

let toastT;
function toast(m){ const t=document.getElementById('toast');t.textContent=m;t.classList.add('show');clearTimeout(toastT);toastT=setTimeout(()=>t.classList.remove('show'),2000); }
setInterval(()=>{ if(!document.getElementById('home').classList.contains('hidden')) loadLeaderboard(); }, 12000);
</script>
